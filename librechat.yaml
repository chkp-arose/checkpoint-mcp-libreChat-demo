      MANAGEMENT_HOST:
        title: "Management Host (Option B/C - On-Premises)"
        description: "IP or hostname of your management server, e.g. 192.168.1.100. Use this OR Smart-1 Cloud URL above, not both."
      MANAGEMENT_PORT:
        title: "Management Port"
        description: "Management server port, default: 443 (optional, for Option B/C)"
      USERNAME:
        title: "Username (Option C - On-Premises)"
