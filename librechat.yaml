      SECRET_KEY:
        title: "Secret Key"
        description: "API secret key from Infinity Portal API Keys (required)"
      INFINITY_PORTAL_URL:
        title: "Infinity Portal URL"
        description: "Infinity Portal URL endpoint, e.g. https://portal.checkpoint.com (required)"
      REGION:
        title: "Region"
        description: "Cloud region code: EU, US, STG, or LOCAL. Default: EU (optional)"
      TELEMETRY_DISABLED:
        title: "Disable Telemetry"
        description: "Set to 'true' to opt out of anonymous usage statistics (optional)"

