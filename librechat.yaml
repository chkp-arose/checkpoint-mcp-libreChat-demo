      - -y
      - "@chkp/management-logs-mcp"
    env:
      S1C_URL: "{{S1C_URL}}"
      MANAGEMENT_HOST: "{{MANAGEMENT_HOST}}"
      MANAGEMENT_PORT: "{{MANAGEMENT_PORT}}"
      API_KEY: "{{API_KEY}}"
      USERNAME: "{{USERNAME}}"
      PASSWORD: "{{PASSWORD}}"
      REGION: "{{REGION}}"
